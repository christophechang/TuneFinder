catalog:
  user_url: ""  # e.g. https://api.changsta.com

discord:
  guild_id: ""  # Override with DISCORD_GUILD_ID env var
  report_channel: music-research
  log_channel: logs
  alert_channel: alerts
  mix_prep_channel: mix-prep

sources:

  beatport:
    enabled: true
    chart_pattern: "https://www.beatport.com/genre/{slug}/{id}/top-100"
    genres:
      # Standalone genres
      - name: downtempo
        slug: downtempo
        id: 63
      - name: dnb
        slug: drum-bass
        id: 1
      - name: electronica
        slug: electronica
        id: 3
      - name: ukg
        slug: uk-garage-bassline
        id: 86
      # House sub-genres — all tagged "house" via _SLUG_TO_TAGS in fetcher
      - name: house
        slug: house
        id: 5
      - name: house
        slug: melodic-house-techno
        id: 90
      - name: house
        slug: minimal-deep-tech
        id: 14
      - name: house
        slug: deep-house
        id: 12
      - name: house
        slug: tech-house
        id: 11
      # Combined breaks + uk-bass feed — per-track genre slug read from __NEXT_DATA__
      - name: breaks-uk-bass
        slug: breaks-breakbeat-uk-bass
        id: 9
      - name: techno
        slug: techno-raw-deep-hypnotic
        id: 92
      - name: hip-hop
        slug: hip-hop
        id: 105
      - name: funk-soul-jazz
        slug: rb
        id: 108

  traxsource:
    enabled: false
    genre_url_pattern: "https://www.traxsource.com/genre/{id}/{slug}/top"
    genres:
      - name: dnb
        id: 31
        slug: drum-and-bass
      # House and sub-genres — all tagged "house"
      - name: house
        id: 4
        slug: house
      - name: house
        id: 13
        slug: deep-house
      - name: house
        id: 24
        slug: soulful-house
      - name: house
        id: 18
        slug: tech-house
      - name: house
        id: 12
        slug: classic-house
      - name: house
        id: 16
        slug: minimal-deep-tech
      # Nu-disco/indie-dance — closest to house in internal taxonomy
      - name: house
        id: 17
        slug: nu-disco-indie-dance
      - name: techno
        id: 20
        slug: techno
      - name: ukg
        id: 29
        slug: garage
      - name: electronica
        id: 5
        slug: electronica
      - name: electronica
        id: 14
        slug: leftfield
      - name: funk-soul-jazz
        id: 3
        slug: soul-funk-disco
      - name: hip-hop
        id: 6
        slug: r-and-b-hip-hop
      - name: downtempo
        id: 1
        slug: lounge-chill-out

  bandcamp:
    enabled: true
    count_per_tag: 20
    tags:
      - drum-and-bass
      - breakbeat
      - uk-garage
      - uk-bass
      - house
      - techno
      - electronic
      - funk
      - r-b-soul
      - hip-hop-rap
      - electronica
      - lounge
      - downtempo

  boomkat:
    enabled: false   # Cloudflare bot protection — cannot scrape

  bleep:
    enabled: false   # Requires login to access new releases

  resident_advisor:
    enabled: false
    releases_url: "https://ra.co/music/releases"

  mixupload:
    enabled: true
    targets:
      - tf_tag: house
        chart: style/house
      - tf_tag: house
        chart: style-part/deep-house
      - tf_tag: house
        chart: style-part/tech-house
      - tf_tag: house
        chart: style-part/progressive-house
      - tf_tag: techno
        chart: style/techno
      - tf_tag: dnb
        chart: style/dnb
      - tf_tag: breaks
        chart: style/breaks
      - tf_tag: hip-hop
        chart: style/hip-hop
      - tf_tag: electronica
        chart: style-part/electronica
      - tf_tag: downtempo
        chart: style-part/downtempo
      - tf_tag: ukg
        chart: style-part/uk-garage
      - tf_tag: uk-bass
        genre: UKBass     # no chart page — uses /genres/{slug}/tracks

  volumo:
    enabled: true
    # API token is optional — browsing works unauthenticated
    # Set VOLUMO_API_KEY in .env for authenticated requests (future use)
    sort: purchase              # 'purchase' avoids corrupted-date catalog entries
    curation: curated           # Volumo-vetted releases only; omit key entirely for all releases
    lookback_days: 28
    limit_per_genre: 50
    genres:
      # house sub-genres — all tagged "house"
      - name: house
        id: 12                  # House
      - name: house
        id: 4                   # Deep House
      - name: house
        id: 21                  # Tech House
      - name: house
        id: 20                  # Soulful House
      - name: house
        id: 10                  # Funky / Jackin' House
      - name: house
        id: 15                  # Melodic House / Techno
      - name: house
        id: 19                  # Progressive House
      - name: house
        id: 1                   # Afro House
      # standalone genres
      - name: dnb
        id: 6                   # Drum and Bass
      - name: techno
        id: 22                  # Techno (Raw, Deep, Dub)
      - name: techno
        id: 23                  # Techno (Peak Time)
      - name: breaks
        id: 3                   # Breaks / Breakbeat
      - name: ukg
        id: 25                  # UK Garage / 2-Step
      - name: electronica
        id: 8                   # Electronica
      - name: downtempo
        id: 18                  # Organic House / Downtempo
      # uk-bass, funk-soul-jazz, hip-hop intentionally not mapped — Volumo has no true-fit genre for them (see docs/improvement-plan.md §3).

pipeline:
  # Release date window applied to all sources with known dates. Bandcamp items always pass (no date available).
  release_date_window_days: 28
  # Minimum score for a track to occupy a report slot — sections may run short.
  # 0 disables the floor (pre-v0.7.1 behaviour).
  section_min_score: 1.0
  top_picks_count: 5
  label_watch_count: 5
  artist_watch_count: 5
  wildcard_count: 3
  mix_prep_top_picks_count: 20
  mix_prep_deep_cuts_count: 20
  # Tracks tagged with any excluded genre are dropped from that genre's mix-prep results.
  # Handles cross-source tag merging where a track acquires contradictory tags (e.g. electronica + ukg).
  # Only define exclusions for genuinely contradictory genre pairs — legitimate overlap (e.g. electronica + downtempo) is intentionally left unexcluded.
  genre_exclusions:
    electronica: [ukg, dnb]
    ukg: [electronica, dnb, techno]
    dnb: [ukg, house]
    house: [dnb, ukg]

alerts:
  # Alert when a source's count falls below this % of its trailing-4-run average.
  source_drop_threshold_pct: 50
  # Prior runs required per source before drop detection activates.
  min_history_runs: 2

# Scoring weights — tune these to adjust how candidates are ranked
# All values listed here are the defaults used if a key is omitted.
# See src/pipeline/ranker.py ScoringWeights for field documentation.
scoring:
  # Artist matching and recurrence
  w_known_artist: 3.0                  # Score per play_count for matched artist
  w_recurring: 2.0                     # Extra bonus if artist play_count >= recurring_threshold
  recurring_threshold: 3               # play_count needed to earn the recurring bonus
  w_recency_penalty: 0.75              # Subtracted if matched artist was recently recommended
  recency_weeks: 4                     # Lookback window for recent recommendations
  # min_artist_match_len: 4            # Matched artist-name parts shorter than this need independent
                                        # corroboration (label or genre match on the same candidate) to
                                        # count toward known_artist/recurring — guards against short-name
                                        # string collisions producing false "You play X" claims.
  # Artist aliases (release name -> canonical mix-catalogue name) live in
  # config/aliases.yaml — see that file for format. Empty by default.

  # Label affinity
  w_label_base: 1.5                    # Base score for any label match
  w_label_per_artist: 0.5              # Additional score per known artist on label
  label_artist_cap: 3                  # Max known artists on label that contribute to score
  # label_memory_max_age_weeks: 26      # Weeks a persisted artist<->label association (data/label_affinity.json,
                                        # see src/pipeline/labels.py) stays "fresh" enough to count toward Label
                                        # Watch relevance and label_match scoring, even with no known artist this week.

  # Cross-source credibility
  w_cross_source_per: 0.5              # Score per source (only when len(sources) >= 2)
  cross_source_cap: 4                  # Max source count that contributes

  # Genre matching
  w_genre: 0.5                         # Score per matching genre tag
  genre_match_cap: 2                   # Max genre tags that contribute to score
  # genre_affinity_min: 0.5            # Multiplier floor — fringe genres (or genres you don't play), from data/genre_affinity.json
  # genre_affinity_max: 2.0            # Multiplier ceiling — your most-played genre(s)

  # Freshness
  w_fresh: 0.5                         # Bonus for recent releases
  fresh_days: 7                        # Release must be <= N days old

  # Chart performance
  w_chart_top: 1.5                     # Max bonus for chart_position == 1
                                       # (decays linearly to 0 at position 100)

  # Bandcamp discovery
  w_bandcamp: 1.0                      # Bonus for Bandcamp sources

  # Artist score cap and pool age
  max_artist_score: 10.0               # Cap total artist score so one mega-artist doesn't dominate
  w_pool_age_per_week: 0.25            # Penalty per week in candidate pool
  pool_age_penalty_max: 1.5            # Cap total pool-age penalty

  # Wildcards axis (two-axis scoring) — Wildcards is selected separately from
  # Top Picks/Label Watch/Artist Watch, which always rank by the combined score above.
  wildcards_axis: discovery             # "discovery" (rank Wildcards by discovery_score only) | "combined" (pre-v0.8 behaviour: rank by total score)
  wildcards_max_familiarity: 0.0        # Wildcards require familiarity_score <= this value when axis is "discovery"

data_dir: data

testing:
  use_fixtures: false
  fixtures_dir: fixtures
