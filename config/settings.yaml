catalog:
  user_url: ""  # e.g. https://api.changsta.com

discord:
  guild_id: ""  # Override with DISCORD_GUILD_ID env var
  report_channel: music-research
  log_channel: logs
  alert_channel: alerts
  mix_prep_channel: mix-prep

sources:

  beatport:
    enabled: true
    chart_pattern: "https://www.beatport.com/genre/{slug}/{id}/top-100"
    genres:
      # Standalone genres
      - name: downtempo
        slug: downtempo
        id: 63
      - name: dnb
        slug: drum-bass
        id: 1
      - name: electronica
        slug: electronica
        id: 3
      - name: ukg
        slug: uk-garage-bassline
        id: 86
      # House sub-genres — all tagged "house" via _SLUG_TO_TAGS in fetcher
      - name: house
        slug: house
        id: 5
      - name: house
        slug: melodic-house-techno
        id: 90
      - name: house
        slug: minimal-deep-tech
        id: 14
      - name: house
        slug: deep-house
        id: 12
      - name: house
        slug: tech-house
        id: 11
      # Combined breaks + uk-bass feed — per-track genre slug read from __NEXT_DATA__
      - name: breaks-uk-bass
        slug: breaks-breakbeat-uk-bass
        id: 9
      - name: techno
        slug: techno-raw-deep-hypnotic
        id: 92
      - name: hip-hop
        slug: hip-hop
        id: 105
      - name: funk-soul-jazz
        slug: rb
        id: 108

  traxsource:
    enabled: false
    genre_url_pattern: "https://www.traxsource.com/genre/{id}/{slug}/top"
    genres:
      - name: dnb
        id: 31
        slug: drum-and-bass
      # House and sub-genres — all tagged "house"
      - name: house
        id: 4
        slug: house
      - name: house
        id: 13
        slug: deep-house
      - name: house
        id: 24
        slug: soulful-house
      - name: house
        id: 18
        slug: tech-house
      - name: house
        id: 12
        slug: classic-house
      - name: house
        id: 16
        slug: minimal-deep-tech
      # Nu-disco/indie-dance — closest to house in internal taxonomy
      - name: house
        id: 17
        slug: nu-disco-indie-dance
      - name: techno
        id: 20
        slug: techno
      - name: ukg
        id: 29
        slug: garage
      - name: electronica
        id: 5
        slug: electronica
      - name: electronica
        id: 14
        slug: leftfield
      - name: funk-soul-jazz
        id: 3
        slug: soul-funk-disco
      - name: hip-hop
        id: 6
        slug: r-and-b-hip-hop
      - name: downtempo
        id: 1
        slug: lounge-chill-out

  bandcamp:
    enabled: true
    count_per_tag: 20
    tags:
      - drum-and-bass
      - breakbeat
      - uk-garage
      - uk-bass
      - house
      - techno
      - electronic
      - funk
      - r-b-soul
      - hip-hop-rap
      - electronica
      - lounge
      - downtempo

  boomkat:
    enabled: false   # Cloudflare bot protection — cannot scrape

  bleep:
    enabled: false   # Requires login to access new releases

  resident_advisor:
    enabled: false
    releases_url: "https://ra.co/music/releases"

  mixupload:
    enabled: true
    targets:
      - tf_tag: house
        chart: style/house
      - tf_tag: house
        chart: style-part/deep-house
      - tf_tag: house
        chart: style-part/tech-house
      - tf_tag: house
        chart: style-part/progressive-house
      - tf_tag: techno
        chart: style/techno
      - tf_tag: dnb
        chart: style/dnb
      - tf_tag: breaks
        chart: style/breaks
      - tf_tag: hip-hop
        chart: style/hip-hop
      - tf_tag: electronica
        chart: style-part/electronica
      - tf_tag: downtempo
        chart: style-part/downtempo
      - tf_tag: ukg
        chart: style-part/uk-garage
      - tf_tag: uk-bass
        genre: UKBass     # no chart page — uses /genres/{slug}/tracks

  volumo:
    enabled: true
    # API token is optional — browsing works unauthenticated
    # Set VOLUMO_API_KEY in .env for authenticated requests (future use)
    sort: purchase              # 'purchase' avoids corrupted-date catalog entries
    curation: curated           # Volumo-vetted releases only; omit key entirely for all releases
    lookback_days: 28
    limit_per_genre: 50
    genres:
      # house sub-genres — all tagged "house"
      - name: house
        id: 12                  # House
      - name: house
        id: 4                   # Deep House
      - name: house
        id: 21                  # Tech House
      - name: house
        id: 20                  # Soulful House
      - name: house
        id: 10                  # Funky / Jackin' House
      - name: house
        id: 15                  # Melodic House / Techno
      - name: house
        id: 19                  # Progressive House
      - name: house
        id: 1                   # Afro House
      # standalone genres
      - name: dnb
        id: 6                   # Drum and Bass
      - name: techno
        id: 22                  # Techno (Raw, Deep, Dub)
      - name: techno
        id: 23                  # Techno (Peak Time)
      - name: breaks
        id: 3                   # Breaks / Breakbeat
      - name: ukg
        id: 25                  # UK Garage / 2-Step
      - name: electronica
        id: 8                   # Electronica
      - name: downtempo
        id: 18                  # Organic House / Downtempo
      # uk-bass, funk-soul-jazz, hip-hop intentionally not mapped — Volumo has no true-fit genre for them (see docs/improvement-plan.md §3).

pipeline:
  # Release date window applied to all sources with known dates. Bandcamp items always pass (no date available).
  release_date_window_days: 28
  # Minimum score for a track to occupy a report slot — sections may run short.
  # 0 disables the floor (pre-v0.7.1 behaviour).
  section_min_score: 1.0
  top_picks_count: 5
  label_watch_count: 5
  artist_watch_count: 5
  wildcard_count: 3
  mix_prep_top_picks_count: 20
  mix_prep_deep_cuts_count: 20
  # Tracks tagged with any excluded genre are dropped from that genre's mix-prep results.
  # Handles cross-source tag merging where a track acquires contradictory tags (e.g. electronica + ukg).
  # Only define exclusions for genuinely contradictory genre pairs — legitimate overlap (e.g. electronica + downtempo) is intentionally left unexcluded.
  genre_exclusions:
    electronica: [ukg, dnb]
    ukg: [electronica, dnb, techno]
    dnb: [ukg, house]
    house: [dnb, ukg]

alerts:
  # Alert when a source's count falls below this % of its trailing-4-run average.
  source_drop_threshold_pct: 50
  # Prior runs required per source before drop detection activates.
  min_history_runs: 2

data_dir: data

testing:
  use_fixtures: false
  fixtures_dir: fixtures
