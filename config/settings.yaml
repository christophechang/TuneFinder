catalog:
  user_url: ""  # e.g. https://api.changsta.com

discord:
  guild_id: ""  # Override with DISCORD_GUILD_ID env var
  report_channel: music-research
  log_channel: logs
  alert_channel: alerts
  mix_prep_channel: mix-prep

llm:
  stage1:
    provider: "minimax"
    model: "MiniMax-M2.5"
    max_tokens: 4096
    temperature: 0.1
    timeout_seconds: 120

  stage2:
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    temperature: 0.2
    timeout_seconds: 90

  # Fallback chain for Stage 1 only — tried in order if primary fails
  fallback_chain:
    - provider: "groq"
      model: "llama-3.3-70b-versatile"
    - provider: "gemini"
      model: "gemini-2.5-flash"
    - provider: "openrouter"
      model: "deepseek/deepseek-chat"
    - provider: "anthropic"
      model: "claude-sonnet-4-6"

sources:

  juno:
    enabled: true
    rss_pattern: "https://www.juno.co.uk/{genre_slug}/feeds/rss/"
    # Maps internal genre names to Juno URL slugs
    genre_map:
      dnb: drumandbass
      breaks: breakbeat
      uk-bass: bass
      ukg: garage
      house: house
      techno: techno
      electronica: leftfield

  beatport:
    enabled: true
    tracks_pattern: "https://www.beatport.com/genre/{slug}/{id}/tracks"
    releases_pattern: "https://www.beatport.com/genre/{slug}/{id}/releases"
    genres:
      # Standalone genres
      - name: downtempo
        slug: downtempo
        id: 63
      - name: dnb
        slug: drum-bass
        id: 1
      - name: electronica
        slug: electronica
        id: 3
      - name: ukg
        slug: uk-garage-bassline
        id: 86
      # House sub-genres — all tagged "house" via _SLUG_TO_TAGS in fetcher
      - name: house
        slug: house
        id: 5
      - name: house
        slug: melodic-house-techno
        id: 90
      - name: house
        slug: minimal-deep-tech
        id: 14
      - name: house
        slug: deep-house
        id: 12
      - name: house
        slug: tech-house
        id: 11
      # Combined breaks + uk-bass feed — per-track genre slug read from __NEXT_DATA__
      - name: breaks-uk-bass
        slug: breaks-breakbeat-uk-bass
        id: 9

  traxsource:
    enabled: true
    genre_url_pattern: "https://www.traxsource.com/genre/{id}/{slug}"
    genres:
      - name: dnb
        id: 31
        slug: drum-and-bass
      - name: house
        id: 4
        slug: house
      - name: techno
        id: 20
        slug: techno
      - name: ukg
        id: 29
        slug: garage
      - name: electronica
        id: 5
        slug: electronica
      - name: electronica
        id: 14
        slug: leftfield

  bandcamp:
    enabled: true
    count_per_tag: 20
    tags:
      - drum-and-bass
      - breakbeat
      - uk-garage
      - uk-bass
      - house
      - techno
      - electronic

  boomkat:
    enabled: false   # Cloudflare bot protection — cannot scrape

  bleep:
    enabled: false   # Requires login to access new releases

  resident_advisor:
    enabled: true
    releases_url: "https://ra.co/music/releases"

  subsurface_selections:
    enabled: true
    archive_url: "https://subsurfaceselections.beehiiv.com/archive"

  discogs:
    enabled: false

pipeline:
  max_candidates: 100
  top_picks_count: 5
  label_watch_count: 5
  artist_watch_count: 5
  wildcard_count: 3
  mix_prep_top_picks_count: 20
  mix_prep_deep_cuts_count: 20

data_dir: data

testing:
  use_fixtures: false
  fixtures_dir: fixtures
